<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Captcha</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: clamp(20px, 5vw, 40px);
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(14px, 3vw, 22px);
    }

    h2 {
      font-size: clamp(16px, 4vw, 20px);
      color: #333;
      font-weight: 600;
    }

    img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
      display: block;
    }

    .error {
      color: #d32f2f;
      font-size: clamp(13px, 3vw, 15px);
      background: #fdecea;
      padding: 10px 16px;
      border-radius: 8px;
      width: 100%;
      text-align: center;
    }

    input {
      width: 100%;
      padding: clamp(12px, 3vw, 16px);
      font-size: clamp(22px, 6vw, 30px);
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      text-align: center;
      letter-spacing: clamp(4px, 2vw, 8px);
      transition: border-color .2s;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: #1a73e8;
      outline: none;
    }

    button {
      width: 100%;
      padding: clamp(12px, 3vw, 16px);
      font-size: clamp(15px, 4vw, 18px);
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: background .2s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover   { background: #1558b0; }
    button:active  { transform: scale(.97); }

    .done {
      font-size: clamp(18px, 5vw, 24px);
      color: #2e7d32;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Captcha Verification</h2>
    <img src="data:image/jpeg;base64,{{B64}}" alt="captcha">
    {{MSG}}
    <input id="code" type="text" placeholder="Enter code" autocomplete="off" autofocus>
    <button onclick="submit()">Verify</button>
  </div>
  <script>
    function submit() {
      var code = document.getElementById('code').value.trim();
      if (!code) return;
      fetch('/submit?code=' + encodeURIComponent(code))
        .then(function(r) { return r.text(); })
        .then(function(t) {
          if (t === 'ok') {
            document.querySelector('.card').innerHTML =
              '<p class="done">✓ Code submitted.<br>Return to terminal.</p>';
          } else {
            window.location.reload();
          }
        });
    }
    document.getElementById('code').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
